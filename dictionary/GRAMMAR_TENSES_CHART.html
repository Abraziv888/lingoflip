<!doctype html>
<html lang="ru">
<head>

<title>Грамматика · Времена</title>
<style>
  :root{ color-scheme: dark; }
  html,body{ margin:0; padding:0; background:#131f24; }
  /* Контейнер фиксированной «дизайнерской» ширины: даёт стабильный размер
     для измерения в просмотрщике (iframe → fit-to-screen). SVG внутри тянется
     на 100% и остаётся векторно-резким на любом масштабе/зуме. */
  .wrap{ width:1040px; max-width:100%; margin:0 auto; }
  .wrap svg{ display:block; width:100%; height:auto; }
  /* Прямое открытие на узком экране — без горизонтальной прокрутки. */
  @media (max-width:1040px){ body{ overflow-x:hidden; } }
</style>
</head>
